---
- name: Verifikasi DHCP
  hosts: routers
  gather_facts: false
  tasks:
    - name: Ambil output DHCP
      cisco.ios.ios_command:
        commands: "show ip dhcp binding"
      register: dhcp_out

    - name: Menampilkan DHCP
      ansible.builtin.debug:
        var: dhcp_out.stdout_lines

    - name: Running config
      cisco.ios.ios_command:
        commands: "show running | section dhcp"
      register: run_out

    - name: Show running
      ansible.builtin.debug:
        var: run_out
