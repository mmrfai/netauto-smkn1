---
hostname: M_EIL
domain: smkn1mgl.sch.id

vlans:
  - { id: 10, name: "lab" }
  - { id: 20, name: "guru" }

svis:
  - { name: "Vlan1", ip: "192.168.10.65/26", desc: "manajemen ansible" }
  - { name: "Vlan10", ip: "172.16.20.1/24", desc: "lab", ip_helper: "10.10.10.17" }
  - { name: "Vlan20", ip: "172.20.20.1/24", desc: "guru", ip_helper: "10.10.10.17" }

routed_interfaces:
  - { name: "Ethernet0/0", desc: "R_EIL", ip: "10.10.10.18/30", enabled: true }

trunk_interfaces:
  - { name: "Ethernet1/0", desc: "S_EL" }
  - { name: "Ethernet1/1", desc: "S_IN" }
  - { name: "Ethernet1/2", desc: "S_LIS" }

shutdown_ports: [
  "Ethernet0/1", "Ethernet0/2", "Ethernet0/3",
  "Ethernet1/3", "Ethernet2/0", "Ethernet2/1",
  "Ethernet2/2", "Ethernet2/3", "Ethernet3/0",
  "Ethernet3/1", "Ethernet3/2", "Ethernet3/3"
]

ospf:
  process: 1
  router_id: "22.22.22.22"
  networks:
    - { address: "10.10.10.16", wildcard_bits: "0.0.0.3", area: 0 }
    - { address: "192.168.10.64", wildcard_bits: "0.0.0.63", area: 0}
    - { address: "172.16.20.0", wildcard_bits: "0.0.0.255", area: 0}
    - { address: "172.20.20.0", wildcard_bits: "0.0.0.255", area: 0}

akses:
  - name: "Vlan10_in"
    type: "extended"
    aces:
      - { sequence: 10, grant: "deny", protocol: "ip", source: { address: "172.16.20.0", wildcard_bits: "0.0.0.255" }, destination: { host: "192.168.30.10" } }
      - { sequence: 20, grant: "deny", protocol: "ip",source: { address: "172.16.20.0", wildcard_bits: "0.0.0.255" }, destination: { host: "192.168.30.5" } }
      - { sequence: 30, grant: "permit", protocol: "ip",source: { any: true }, destination: { any: true } }
    apply: "Vlan10"
    direction: "in"

